{% extends "base.html" %}
{% block title %}Вход — Alfa Top Report{% endblock %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:75vh;">
    <div class="card p-4" style="width:100%; max-width:380px;">
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center mb-3" style="width:52px; height:52px; border-radius:14px; background-color:var(--accent-soft);">
                <i class="bi bi-bar-chart-line-fill" style="font-size:1.4rem; color:var(--accent);"></i>
            </div>
            <div class="page-eyebrow">Портал отчётности</div>
            <h1 class="page-title">Alfa Top Report</h1>
        </div>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input type="text" class="form-control" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Войти</button>
        </form>
    </div>
</div>
{% endblock %}
